plugins {
	id 'java-library'
}

group = 'com.monkey'
version = '1.0.0'

java {
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
}

repositories {
	mavenCentral()
}

dependencies {
	// 트랜잭션 어노테이션 지원
	compileOnly 'org.springframework:spring-tx:6.1.5'

	// Auditing 기능 지원
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa:3.2.4'
}
